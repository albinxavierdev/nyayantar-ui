name: Security audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Mondays

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit dependencies
        # Fails the build on known vulnerable pinned dependencies.
        run: pip-audit -r requirements.lock.txt --fail-on low

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: python -m pip install -r requirements.lock.txt pytest
      - name: Run security tests
        env:
          API_KEY: test-api-key
          SECRET_KEY: test-secret-key
          ADMIN_EMAILS: admin@firm.com
          MAX_FAILED_LOGINS: "2"
        run: python -m pytest tests/ -q

  frontend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm audit --audit-level=high
      # Extra frontend SCA via OSV (beyond npm audit).
      - name: OSV scanner (frontend)
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --recursive
            --skip-git
            webapp
