name: Production Deployment (Nyayantar)

on:
  push:
    branches:
      - main 

jobs:
  deploy-to-kvm:
    name: Deploy to KVM Server
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Starting Deployment Process..."
            
            # Navigate to the isolated project directory
            cd /srv/nyayantar-ui
            
            # 1. Pull the newly combined code from GitHub
            git pull origin main
            
            # 2. Frontend (Next.js) Staging & Launch
            echo "Updating Frontend..."
            cd webapp
            npm ci
            npm run build # Required to compile the latest Next.js UI changes
            pm2 restart nyayantar-ui
            
            # 3. Backend (FastAPI) Staging & Initialization
            echo "Updating Backend..."
            cd ..
            # If you add new Python packages in the future, uncomment the line below:
            source venv/bin/activate && pip install -r requirements.txt
            pm2 restart nyayantar-api
            
            # 4. Save PM2 State
            pm2 save
            
            echo "Deployment Successful!"